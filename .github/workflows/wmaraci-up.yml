name: Wmaraci Yukari Tasima

on:
  # ASIL tetikleyici: cron-job.org (#7942306, */5 dk) -> repository_dispatch [wmaraci-up].
  # GERI EKLENDI (2026-07-07): tek basina GitHub 'schedule' guvenilmez, 2-4 saatte bir
  # calisiyordu (ilan 30 dk yerine saatlerce bekliyordu). Repo artik PUBLIC = sinirsiz
  # bedava dakika, dolayisiyla eski kota derdi yok; cift tetik sorun degil.
  # GATE (30 dk) fazla bump'i engeller: */5 ping gelse de 30 dk dolmadan sunucuya dokunmaz.
  repository_dispatch:
    types: [wmaraci-up]
  # Zayif yedek: GitHub'in kendi schedule'i (guvenilmez, saatlerce atlar - buna guvenme).
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:
    inputs:
      test:
        description: 'Test modu (sonuc ne olursa Telegram at, sure beklemeden dene)'
        type: boolean
        default: true

permissions:
  contents: write   # wmaraci-state.json'i repoya geri yazabilmek icin

concurrency:
  group: wmaraci-up
  cancel-in-progress: false

jobs:
  up:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # setup-python KALDIRILDI: script tamamen standart kutuphane (urllib/json/gzip),
      # ubuntu-latest'te hazir gelen python3 yeterli. Her kosuyu ~30 sn kisaltir (kota dostu).

      - name: Ilani yukari tasi
        env:
          WMARACI_COOKIE:    ${{ secrets.WMARACI_COOKIE }}
          WMARACI_PHONE:     ${{ secrets.WMARACI_PHONE }}      # oto yeniden-giris (cookie dusunce)
          WMARACI_PASSWORD:  ${{ secrets.WMARACI_PASSWORD }}   # 'email' alanina TELEFON gider (secret)
          TG_BOT_TOKEN:      ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_ID:        ${{ secrets.TG_CHAT_ID }}
          WMARACI_THREAD_IDS: '714013'        # virgulle birden fazla: '714013,712916'
          WMARACI_BUMP_INTERVAL_MIN: '30'     # wmaraci limiti: ilan basina 30 dk (basari -> +31 dk tetik)
          WMARACI_RETRY_AFTER_MIN:   '5'      # GECICI hata (cloudflare/baglanti) -> ayni is icinde 5 dk sonra tekrar
          WMARACI_MAX_RETRIES:       '1'      # gecici hatada kac kez daha denensin (0 = kapali). Kalici (AUTH) hata beklemez.
          WMARACI_GATE_WAIT_MAX_MIN: '4'      # tetik 30 dk penceresinden <=4 dk once gelirse: atlama, kalani is icinde bekle (30 dk'da bir tassin, saatte bir degil)
          WMARACI_TEST:      ${{ github.event_name == 'workflow_dispatch' && inputs.test }}
        run: python3 wmaraci_yukari.py

      - name: Durumu kaydet (sadece degistiyse)
        if: always()
        run: |
          if [ -n "$(git status --porcelain wmaraci-state.json)" ]; then
            git config user.name  "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add wmaraci-state.json
            git commit -m "state: tasima kaydi [skip ci]"
            for i in 1 2 3; do
              git pull --rebase --autostash && git push && break
              echo "push tekrar deneniyor ($i)..."; sleep 3
            done
          else
            echo "Durum degismedi, commit yok."
          fi
